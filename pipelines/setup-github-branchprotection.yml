# File: setup-github-branchprotection.yml
# Purpose: Configure GitHub branch protection rules for the main branch
# Note: This replaces Azure Repos branch policies with GitHub branch protection
# Docs: https://docs.github.com/en/rest/branches/branch-protection

trigger: none
pr: none

parameters:
- name: branchName
  type: string
  default: 'main'

- name: githubRepoOwner
  type: string
  default: 'marc-mueller'

- name: githubRepoName
  type: string
  default: 'FastFoodBetterTogether'

- name: minimumApprovers
  type: number
  default: 1

- name: requireCodeOwnerReviews
  type: boolean
  default: false

- name: dismissStaleReviews
  type: boolean
  default: true

- name: requireLinearHistory
  type: boolean
  default: false

- name: allowForcePushes
  type: boolean
  default: false

- name: allowDeletions
  type: boolean
  default: false

- name: requiredStatusChecks
  type: object
  default:
    # Generic checks
    - context: 'fastfood-security-scan'
    # Service-specific CI checks
    - context: 'ci-orderservice'
    - context: 'ci-kitchenservice'
    - context: 'ci-financeservice'
    - context: 'ci-frontendcustomerorderstatus'
    - context: 'ci-frontendkitchenmonitor'
    - context: 'ci-frontendselfservicepos'
    
    # PR environment checks
    - context: 'pr-deployment-orderservice'
    - context: 'pr-deployment-kitchenservice'
    - context: 'pr-deployment-financeservice'
    - context: 'pr-deployment-frontendcustomerorderstatus'
    - context: 'pr-deployment-frontendkitchenmonitor'
    - context: 'pr-deployment-frontendselfservicepos'
    
    # Work item check
    - context: 'fastfood-wi-content-check'

- name: githubServiceConnection
  type: string
  default: 'marc-mueller'

pool:
  vmImage: ubuntu-latest

steps:
- checkout: none

# Get GitHub token from service connection
- task: GetGitHubToken@1
  displayName: "Get GitHub Token"
  inputs:
    gitHubConnection: '${{ parameters.githubServiceConnection }}'
    variableName: 'GitHubToken'

- bash: |
    set -euo pipefail
    
    OWNER="${{ parameters.githubRepoOwner }}"
    REPO="${{ parameters.githubRepoName }}"
    BRANCH="${{ parameters.branchName }}"
    
    echo "Configuring GitHub branch protection for $OWNER/$REPO on branch $BRANCH"
    
    # Full JSON for required status checks (list of { context: "..." })
    STATUS_CHECKS_JSON='${{ convertToJson(parameters.requiredStatusChecks) }}'
    
    echo "Required status checks JSON:"
    echo "$STATUS_CHECKS_JSON" | jq '.'
    
    # Build the branch protection configuration
    PROTECTION_CONFIG=$(jq -n \
      --argjson checks "$STATUS_CHECKS_JSON" \
      --arg min_approvers "${{ parameters.minimumApprovers }}" \
      --arg code_owner_reviews "${{ parameters.requireCodeOwnerReviews }}" \
      --arg dismiss_stale "${{ parameters.dismissStaleReviews }}" \
      --arg linear_history "${{ parameters.requireLinearHistory }}" \
      --arg force_push "${{ parameters.allowForcePushes }}" \
      --arg allow_deletions "${{ parameters.allowDeletions }}" \
      '
      def bool($s): ($s | ascii_downcase) == "true";

      {
        required_status_checks: {
          strict: true,
          contexts: [ $checks[].context ]
        },
        enforce_admins: false,
        required_pull_request_reviews: {
          dismiss_stale_reviews: bool($dismiss_stale),
          require_code_owner_reviews: bool($code_owner_reviews),
          required_approving_review_count: ($min_approvers | tonumber)
        },
        restrictions: null,
        required_linear_history: bool($linear_history),
        allow_force_pushes: bool($force_push),
        allow_deletions: bool($allow_deletions),
        required_conversation_resolution: false
      }')
    
    echo "Branch protection configuration:"
    echo "$PROTECTION_CONFIG" | jq '.'
    
    if [ -z "${GITHUB_TOKEN:-}" ]; then
      echo "WARNING: GITHUB_TOKEN environment variable is not set"
      echo "The GetGitHubToken task may not have run successfully, or the extension may not be installed."
      exit 1
    fi
    
    echo "Applying branch protection to $OWNER/$REPO branch $BRANCH..."
    
    RESPONSE=$(curl -X PUT \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer ${GITHUB_TOKEN}" \
      -H "X-GitHub-Api-Version: 2022-11-28" \
      -d "$PROTECTION_CONFIG" \
      "https://api.github.com/repos/$OWNER/$REPO/branches/$BRANCH/protection" \
      -w "\n%{http_code}" \
      -s)
    
    HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
    BODY=$(echo "$RESPONSE" | sed '$d')
    
    if [ "$HTTP_CODE" = "200" ]; then
      echo "✓ Branch protection successfully configured"
      echo "$BODY" | jq '.'
    else
      echo "✗ Failed to configure branch protection (HTTP $HTTP_CODE)"
      echo "$BODY" | jq '.' || echo "$BODY"
      exit 1
    fi
  displayName: 'Configure GitHub Branch Protection'
  env:
    GITHUB_TOKEN: $(GitHubToken)

- bash: |
    echo ""
    echo "============================================"
    echo "GitHub Branch Protection Configuration"
    echo "============================================"
    echo ""
    echo "Branch protection has been configured for branch: ${{ parameters.branchName }}"
    echo ""
    echo "Key settings:"
    echo "  - Minimum approvers: ${{ parameters.minimumApprovers }}"
    echo "  - Dismiss stale reviews: ${{ parameters.dismissStaleReviews }}"
    echo "  - Require linear history: ${{ parameters.requireLinearHistory }}"
    echo ""
    echo "Next steps:"
    echo "  1. Verify settings at: https://github.com/${{ parameters.githubRepoOwner }}/${{ parameters.githubRepoName }}/settings/branches"
    echo "  2. Ensure Azure DevOps pipelines report status to GitHub (configured in pipeline YAML)"
    echo "  3. Test by creating a pull request"
    echo ""
  displayName: 'Summary'
