version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dapr:
        patterns:
          - "Dapr.*"
        update-types:
          - "minor"
          - "patch"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"

  - package-ecosystem: "npm"
    directory: "/src/services/frontendselfservicepos/FrontendSelfServicePos/clientapp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "pinia"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "npm"
    directory: "/src/services/frontendkitchenmonitor/FrontendKitchenMonitor/clientapp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "pinia"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "npm"
    directory: "/src/services/frontendcustomerorderstatus/FrontendCustomerOrderStatus/clientapp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "pinia"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
